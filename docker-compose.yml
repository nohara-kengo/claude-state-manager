services:
  task-runner:
    build: .
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GH_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GIT_AUTHOR_NAME=${GIT_USER_NAME:-claude-task-runner}
      - GIT_AUTHOR_EMAIL=${GIT_USER_EMAIL:-claude-task-runner@noreply.github.com}
      - GIT_COMMITTER_NAME=${GIT_USER_NAME:-claude-task-runner}
      - GIT_COMMITTER_EMAIL=${GIT_USER_EMAIL:-claude-task-runner@noreply.github.com}
    volumes:
      - ./config.yml:/app/config.yml:ro
      - workspace:/workspace
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  workspace:
