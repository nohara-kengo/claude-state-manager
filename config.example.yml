# Claude Code Task Runner Configuration
# Copy to config.yml and modify as needed.

# Directory where repos are cloned
workspace_dir: /workspace

# Max Claude Code turns per task
max_turns: 50

# Task timeout in seconds (30 minutes)
task_timeout: 1800

# Permission mode for Claude Code execution
#   acceptEdits - Auto-accept file edits (recommended)
#   default     - Prompt for all dangerous operations
permission_mode: "acceptEdits"

# Bash commands to auto-approve (written to .claude/settings.json per repo)
# Uses Claude Code's allowedTools pattern: Bash(<pattern>)
# git merge / git rebase / git pull はデフォルトで許可していない（PR 経由でマージさせる想定）
allowed_bash_commands:
  # git (merge/rebase/pull を除外)
  - "git status *"
  - "git diff *"
  - "git log *"
  - "git show *"
  - "git branch *"
  - "git checkout *"
  - "git add *"
  - "git commit *"
  - "git push *"
  - "git fetch *"
  - "git stash *"
  - "git rm *"
  - "git mv *"
  - "git tag *"
  # build / test
  - "npm *"
  - "python *"
  - "pytest *"
  - "make *"
  # read-only shell
  - "ls *"
  - "cat *"
  - "find *"
  - "grep *"

# 全コマンド許可する場合:
# allowed_bash_commands:
#   - "*"

github:
  # List of repos to watch for tasks
  repos:
    - "owner/repo"

  # Label that marks an issue as a task for Claude
  task_label: "claude-task"

  # Label applied while Claude is working on the task
  in_progress_label: "claude-in-progress"

  # Label applied when Claude is done
  done_label: "claude-done"

# Secrets should be set via environment variables:
#   GITHUB_TOKEN       - GitHub personal access token
#   ANTHROPIC_API_KEY  - Anthropic API key
